# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2
pro: true

project_name: compozy

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
  license: "BSL-1.1"
  homepage: "https://github.com/compozy/compozy"
  description: "Compozy CLI"
  maintainers:
    - "Compozy Team <support@compozy.com>"

env:
  - GO111MODULE=on
  - CGO_ENABLED=0

git:
  tag_sort: -version:refname

builds:
  - id: compozy
    main: ./cmd/compozy
    binary: compozy
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/compozy/compozy/internal/version.Version={{ .Version }}
      - -X github.com/compozy/compozy/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/compozy/compozy/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: compozy-archive
    ids:
      - compozy
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

source:
  enabled: true

changelog:
  # Use git history so the first release works before a previous tag exists on GitHub.
  use: git
  sort: asc
  abbrev: 7
  groups:
    - title: "🎉 Features"
      regexp: "^.*feat[\\(\\w)]*:+.*$"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^.*fix[\\(\\w)]*:+.*$"
      order: 1
    - title: "⚡ Performance Improvements"
      regexp: "^.*perf[\\(\\w)]*:+.*$"
      order: 2
    - title: "🔒 Security"
      regexp: "^.*security[\\(\\w)]*:+.*$"
      order: 3
    - title: "📚 Documentation"
      regexp: "^.*docs[\\(\\w)]*:+.*$"
      order: 4
    - title: "♻️ Refactoring"
      regexp: "^.*refactor[\\(\\w)]*:+.*$"
      order: 5
    - title: "📦 Dependencies"
      regexp: "^.*deps[\\(\\w)]*:+.*$"
      order: 6
    - title: "🧪 Testing"
      regexp: "^.*test[\\(\\w)]*:+.*$"
      order: 7
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^(build|ci): "
      - "^ci\\(release\\): "
      - "^chore\\(release\\): "
      - "^chore: auto-update generated files$"
      - "^chore: docs$"
      - "^chore: schema update$"
      - "^chore: typo$"
      - "^chore\\(legal\\): "
      - "^chore\\(deps\\): "
      - "^docs: update$"
      - "^test:"
      - "^test\\("
      - "merge conflict"
      - Merge branch
      - Merge pull request
      - Merge remote-tracking branch
      - go mod tidy
      - "^wip "
      - "^wip:"

release:
  github:
    owner: compozy
    name: compozy
  name_template: "Release {{ .Version }}"
  mode: replace
  draft: false
  prerelease: auto
  header: |
    ## Compozy CLI {{ .Version }}

    Welcome to the latest release of the Compozy CLI!

    ### Installation

    #### Homebrew
    ```bash
    brew tap compozy/compozy
    brew install --cask compozy
    ```

    #### NPM
    ```bash
    npm install -g @compozy/cli
    ```

    #### Binary Download
    Download the appropriate `compozy_{{ .Version }}_<os>_<arch>.tar.gz` asset for your platform and extract it.

    #### Go Install
    ```bash
    go install github.com/compozy/compozy/cmd/compozy@{{ .Tag }}
    ```

  footer: |
    ### Verification

    All release artifacts are signed and can be verified:

    #### Checksums
    ```bash
    cosign verify-blob \
      --signature checksums.txt.sig \
      --certificate checksums.txt.pem \
      checksums.txt
    ```

    {{- if .PreviousTag }}
    **Full Changelog**: https://github.com/compozy/compozy/compare/{{ .PreviousTag }}...{{ .Tag }}
    {{- else }}
    **Source**: https://github.com/compozy/compozy/tree/{{ .Tag }}
    {{- end }}

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

# Homebrew cask configuration
homebrew_casks:
  - name: compozy
    repository:
      owner: compozy
      name: homebrew-compozy
      branch: main
      token: "{{ .Env.RELEASE_TOKEN }}"

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Casks
    caveats: |
      To get started with Compozy, see https://github.com/compozy/compozy
    homepage: "https://github.com/compozy/compozy"
    description: "Compozy CLI"
    skip_upload: auto

# NPM package configuration
npms:
  - name: "@compozy/cli"
    description: "Compozy CLI"
    repository: "git+https://github.com/compozy/compozy.git"
    bugs: https://github.com/compozy/compozy/issues
    access: public
    license: BSL-1.1
    homepage: "https://compozy.com"

# Arch User Repository (AUR) configuration
aurs:
  - name: compozy-bin
    homepage: "https://github.com/compozy/compozy"
    description: "Compozy CLI"
    maintainers:
      - "Compozy Team <support@compozy.com>"
    license: "MIT"
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/compozy-bin.git'
    provides:
      - compozy
    conflicts:
      - compozy
      - compozy-git
    package: |-
      # Binaries
      # GoReleaser wraps files in a directory named after the archive
      cd "${srcdir}/${pkgname%-bin}_${pkgver}_linux_"*
      install -Dm755 "${pkgname%-bin}" "${pkgdir}/usr/bin/${pkgname%-bin}"

      # License
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

      # README
      install -Dm644 README.md "${pkgdir}/usr/share/doc/${pkgname}/README.md"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "AUR package update for {{ .ProjectName }} version {{ .Tag }}"

