sidecar: git@github.com:compozy/specs.git
settings:
  guardrails:
    max_files: 10000
    max_bytes: 209715200
  hooks:
    pre_push_timeout: 30s
    allow_skip_env: SKEEPER_SKIP
namespaces:
  - name: compozy
    patterns:
      - .compozy/**
      - .codex/ledger/**
      - .codex/plans/**
      - .codex/qa/**
      - .codex/release-021-qa/**
      - .codex/tmp/**
      - .claude/ledger/**
    exclude:
      - .compozy/runs/**
