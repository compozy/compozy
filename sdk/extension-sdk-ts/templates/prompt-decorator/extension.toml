[extension]
name = "__EXTENSION_NAME__"
version = "__EXTENSION_VERSION__"
description = "Prompt decorator starter extension"
min_compozy_version = "__COMPOZY_MIN_VERSION__"

[subprocess]
command = "node"
args = ["dist/src/index.js"]

[security]
capabilities = ["prompt.mutate"]

[[hooks]]
event = "prompt.post_build"
